name: 금융 데일리 리포트

on:
  schedule:
    - cron: '0 0 * * *'   # 09:00 KST
    - cron: '0 3 * * *'   # 12:00 KST
    - cron: '0 6 * * *'   # 15:00 KST
    - cron: '0 9 * * *'   # 18:00 KST
    - cron: '0 12 * * *'  # 21:00 KST
    - cron: '0 15 * * *'  # 00:00 KST
    - cron: '0 18 * * *'  # 03:00 KST
    - cron: '0 21 * * *'  # 06:00 KST
  workflow_dispatch:       # 수동 실행 가능

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  report:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: pip 캐시
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}

      - name: KST 날짜 설정
        run: echo "TODAY_KST=$(TZ=Asia/Seoul date +%Y%m%d)" >> $GITHUB_ENV

      - name: 시장 데이터 히스토리 캐시
        uses: actions/cache@v4
        with:
          path: data/history
          key: market-history-${{ github.run_id }}
          restore-keys: |
            market-history-

      - name: 일간 뉴스 누적 캐시
        uses: actions/cache@v4
        with:
          path: data/daily_cache
          key: daily-news-${{ env.TODAY_KST }}-${{ github.run_id }}
          restore-keys: |
            daily-news-${{ env.TODAY_KST }}-

      - name: 속보 캐시 (2일 보관)
        uses: actions/cache@v4
        with:
          path: data/daily_cache/sokbo.json
          key: sokbo-${{ github.run_id }}
          restore-keys: |
            sokbo-

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: 리포트 생성
        run: python run.py

      - name: docs/에 최신 리포트 복사
        run: |
          TODAY=$(date +%Y%m%d)
          mkdir -p docs
          cp reports/report_${TODAY}.html docs/index.html

      - name: 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git diff --staged --quiet || git commit -m "report: $(date +'%Y-%m-%d') 금융 데일리"
          git push
