name: 금융 데일리 리포트

on:
  schedule:
    - cron: '0 0 * * *'   # 오전 9시 KST (00:00 UTC)
    - cron: '0 3 * * *'   # 오후 12시 KST (03:00 UTC)
    - cron: '0 6 * * *'   # 오후 3시 KST (06:00 UTC)
  workflow_dispatch:       # 수동 실행 가능

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  report:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: pip 캐시
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}

      - name: 시장 데이터 히스토리 캐시
        uses: actions/cache@v4
        with:
          path: data/history
          key: market-history-${{ github.run_id }}
          restore-keys: |
            market-history-

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: 리포트 생성
        run: python run.py

      - name: docs/에 최신 리포트 복사
        run: |
          TODAY=$(date +%Y%m%d)
          mkdir -p docs
          cp reports/report_${TODAY}.html docs/index.html

      - name: 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git diff --staged --quiet || git commit -m "report: $(date +'%Y-%m-%d') 금융 데일리"
          git push
