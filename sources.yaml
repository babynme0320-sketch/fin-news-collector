# WebScraperCollector가 이 파일에서 직접 읽어 동작
# 새 웹/PDF 소스 추가: 이 파일에 항목 추가, 코드 수정 불필요

web_sources:
  - name: "한국경제"
    enabled: true
    url: "https://www.hankyung.com/mr"
    type: "articles"
    parser: "html.parser"
    selectors:
      list_container: "div.aside-news-module div.news-list"
      item: "div.news-item"
      title: "h3.news-tit a"
      link: "h3.news-tit a"
      date: "span.date"
      lede_url: true
    max_items: 10
    encoding: "utf-8"

  - name: "한국경제 금융·마켓"
    enabled: true
    url: "https://www.hankyung.com/financial-market"
    type: "articles"
    parser: "html.parser"
    selectors:
      list_container: "div.news-item-group"
      item: "div.news-item"
      title: "h2.news-tit a"
      link: "h2.news-tit a"
      date: "p.txt-date"
      lede: "p.lead"
    max_items: 8
    encoding: "utf-8"

  - name: "한국경제 경제"
    enabled: true
    url: "https://www.hankyung.com/economy"
    type: "articles"
    parser: "html.parser"
    selectors:
      list_container: "div.news-item-group"
      item: "div.news-item"
      title: "h2.news-tit a"
      link: "h2.news-tit a"
      date: "p.txt-date"
      lede: "p.lead"
    max_items: 8
    encoding: "utf-8"

  - name: "연준 보고서"
    enabled: true
    url: "https://www.federalreserve.gov/monetarypolicy/fomc.htm"
    type: "pdf_links"
    selectors:
      list_container: "div.panel__fr-consumer-help"
      item: "ul.clean li"
      title: "a"
      link: "a[href$='.pdf']"
    max_items: 5
    encoding: "utf-8"

  - name: "KB금융 리서치"
    enabled: true
    url: "https://www.kbsec.com/go.able?linkcd=s040203010001"
    type: "pdf_links"
    response_format: "json"
    request_method: "POST"
    request_data:
      tab: "1"
      searchMonth: "1"
      searchTxt: ""
      searchFlag: ""
      pCatfolderid: ""
      templateid: ""
      lowTempId: ""
    items_key: "list"
    fields:
      title: "docTitle"
      link: "urlLink"
      date: "publicDate"
    max_items: 10
    encoding: "utf-8"

