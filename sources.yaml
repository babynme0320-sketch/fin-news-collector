# WebScraperCollector가 이 파일에서 직접 읽어 동작
# 새 웹/PDF 소스 추가: 이 파일에 항목 추가, 코드 수정 불필요

web_sources:
  - name: "한국경제"
    enabled: true
    url: "https://www.hankyung.com/feed/all-news"
    type: "articles"
    parser: "lxml-xml"
    selectors:
      list_container: ""
      item: "item"
      title: "title"
      link: "link"
      date: "pubDate"
      lede: "description"
    max_items: 10
    encoding: "utf-8"

  - name: "한국경제 금융·마켓"
    enabled: true
    url: "https://www.hankyung.com/feed/finance"
    type: "articles"
    parser: "lxml-xml"
    selectors:
      list_container: ""
      item: "item"
      title: "title"
      link: "link"
      date: "pubDate"
      lede: "description"
    max_items: 8
    encoding: "utf-8"

  - name: "한국경제 경제"
    enabled: true
    url: "https://www.hankyung.com/feed/economy"
    type: "articles"
    parser: "lxml-xml"
    selectors:
      list_container: ""
      item: "item"
      title: "title"
      link: "link"
      date: "pubDate"
      lede: "description"
    max_items: 8
    encoding: "utf-8"

  - name: "CNBC 경제"
    enabled: true
    url: "https://www.cnbc.com/id/20910258/device/rss/rss.html"
    type: "articles"
    parser: "lxml-xml"
    selectors:
      list_container: ""
      item: "item"
      title: "title"
      link: "link"
      date: "pubDate"
      lede: "description"
    max_items: 10
    encoding: "utf-8"

  - name: "NYT 경제"
    enabled: true
    url: "https://rss.nytimes.com/services/xml/rss/nyt/Economy.xml"
    type: "articles"
    parser: "lxml-xml"
    selectors:
      list_container: ""
      item: "item"
      title: "title"
      link: "guid"
      date: "pubDate"
      lede: "description"
    max_items: 10
    encoding: "utf-8"

  - name: "매일경제"
    enabled: true
    url: "https://www.mk.co.kr/news/economy/"
    type: "articles"
    parser: "html.parser"
    selectors:
      list_container: "ul.article_list_bx"
      item: "li.article_list"
      title: "h4"
      link: "a.news_item"
      lede: "p.art_desc"
      date: "p.time_info"
    max_items: 10
    encoding: "utf-8"

  - name: "한국경제 사설"
    enabled: true
    url: "https://www.hankyung.com/feed/opinion"
    type: "articles"
    parser: "lxml-xml"
    selectors:
      list_container: ""
      item: "item"
      title: "title"
      link: "link"
      date: "pubDate"
      lede: "description"
    max_items: 9
    encoding: "utf-8"

  - name: "매일경제 사설"
    enabled: true
    url: "https://www.mk.co.kr/opinion/editorial/"
    type: "articles"
    parser: "html.parser"
    selectors:
      list_container: "ul.article_list_bx"
      item: "li.article_list"
      title: "h4"
      link: "a.news_item"
      lede: "p.art_desc"
      date: "p.time_info"
    max_items: 5
    encoding: "utf-8"

  - name: "연준 보고서"
    enabled: true
    url: "https://www.federalreserve.gov/monetarypolicy/fomc.htm"
    type: "pdf_links"
    selectors:
      list_container: "div.panel__fr-consumer-help"
      item: "ul.clean li"
      title: "a"
      link: "a[href$='.pdf']"
    max_items: 5
    encoding: "utf-8"

  - name: "KB금융 리서치"
    enabled: true
    url: "https://www.kbsec.com/go.able?linkcd=s040203010001"
    type: "pdf_links"
    response_format: "json"
    request_method: "POST"
    request_data:
      tab: "1"
      searchMonth: "1"
      searchTxt: ""
      searchFlag: ""
      pCatfolderid: ""
      templateid: ""
      lowTempId: ""
    items_key: "list"
    fields:
      title: "docTitle"
      link: "urlLink"
      date: "publicDate"
    max_items: 10
    encoding: "utf-8"

