<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>금융 데일리</title>
  <style>
    body {
      margin: 0;
      background: #f8fafc;
      color: #0f172a;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .box {
      text-align: center;
      padding: 40px 24px;
    }
    h1 { margin: 0 0 10px; font-size: 1.6rem; }
    p { color: #64748b; margin: 4px 0; font-size: 0.95rem; }
    .badge {
      display: inline-block;
      margin-top: 20px;
      background: #2563eb;
      color: #fff;
      border-radius: 999px;
      padding: 4px 14px;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>📈 금융 데일리</h1>
    <p>매일 오전 7시에 새 리포트가 자동 생성됩니다.</p>
    <p>첫 번째 리포트는 다음 스케줄에 표시됩니다.</p>
    <div class="badge">GitHub Actions 자동화</div>
  </div>
</body>
</html>
